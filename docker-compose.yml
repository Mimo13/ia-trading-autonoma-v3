services:
  freqtrade:
    image: freqtradeorg/freqtrade:stable
    container_name: freqtrade
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /Volumes/Almacen/Desarrollo/ia-trading-autonoma-v3/user_data:/freqtrade/user_data
    command: >
      trade
      --config /freqtrade/user_data/config.json
      --strategy SampleStrategy
    environment:
      - FREQTRADE__API_SERVER__USERNAME=freqtrader
      - FREQTRADE__API_SERVER__PASSWORD=${FREQTRADE_PASSWORD:-password}
      - BINANCE_API_KEY=${BINANCE_TESTNET_API_KEY}
      - BINANCE_API_SECRET=${BINANCE_TESTNET_SECRET_KEY}
    user: "1000:1000"
    networks:
      - trading-network

networks:
  trading-network:
    driver: bridge
